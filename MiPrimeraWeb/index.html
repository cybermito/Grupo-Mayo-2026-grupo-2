<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mi primera web</title>
    <!-- Esto es un comentario en HTML -->
    <!-- Dentro del head tenemos la configuración de la página y los enlaces a archivos externos como style.css, script.js, etc...-->
  </head>
  <body>
    <!-- Dentro del body tenemos toda la parte visible de la página. -->
    <!-- Etiquetas de texto -->
    <!-- Párrafo <p>
        Cabeceras/Títulos <h1>, h2, h3, h4, h5, h6
        Texto importante
        <strong>
        <em>
    -->
    <h1>Mi primera web</h1>
    <p>Si puedes imaginarlo y soñarlo, puedes crearlo y programarlo.</p>

    <p>
      Este texto es <strong>importante</strong> y sale en negrita, pero no es
      decoración.
    </p>

    <p>Este texto <em>tambien es importante</em> pero sale en itálica.</p>

    <!-- Etiquetas link -->
    <a href="http://atigra.es">La mejor web del mundo.</a>

    <!-- Etiqueta imagen-->
    <!-- Imágenes externas -->
    <img src="" alt="" />
  </body>
</html>
